name: Update MND 30-Year Fixed Rate

on:
  schedule:
    # Runs daily at 6:00 PM ET (22:00 UTC) — after MND typically posts end-of-day rate
    - cron: '0 22 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  update-rate:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required to commit back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape MND rate and write rates.json
        run: python scrape_rate.py

      - name: Commit and push updated rates.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rates.json
          git diff --cached --quiet && echo "No rate change, skipping commit." || git commit -m "chore: update MND 30yr fixed rate $(date -u +'%Y-%m-%d')"
          git push
